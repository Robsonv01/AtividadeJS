<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p id="mensagem">Texo Original</p>
    <button onclick="text()">Alterar Texto</button>

    <script>
      function text() {
        document.getElementById("mensagem").textContent = "Texto alterado js";
      }
    </script>
  </body>
</html>
