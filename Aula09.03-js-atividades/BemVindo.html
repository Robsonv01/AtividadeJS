<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="mostrarMensagem()">Click aqui</button>
    <p id="mensagem"></p>

    <script>
      function mostrarMensagem() {
        document.getElementById("mensagem").textContent = "Olá, bem vindo!";
      }
    </script>
  </body>
</html>
