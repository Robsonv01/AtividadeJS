<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Simples</title>
  </head>
  <body>
    <h2>Calculadora</h2>
    <input type="number" id="num1" placeholder="numero1" />
    <input type="number" id="num2" placeholder="numero2" />
    <br />
    <br />
    <button onclick="soma()">+</button>
    <button onclick="sub()">-</button>
    <button onclick="multi()">*</button>
    <button onclick="divi()">/</button>
    <h3>Resultado <span id="resultado">0</span></h3>
    <script>
      function pegarValores() {
        let n1 = Number(document.getElementById("num1").value);
        let n2 = Number(document.getElementById("num2").value);

        return { n1, n2 };
      }
      function soma() {
        let { n1, n2 } = pegarValores();
        let soma = n1 + n2;
        mostraResultado(soma);
      }
      {
        function sub() {
          let { n1, n2 } = pegarValores();
          let soma = n1 - n2;
          mostraResultado(soma);
        }
        function multi() {
          let { n1, n2 } = pegarValores();
          let soma = n1 * n2;
          mostraResultado(soma);
        }
        function divi() {
          let { n1, n2 } = pegarValores();
          let soma = n1 / n2;
          mostraResultado(soma);
        }
      }
      function mostraResultado(valor) {
        document.getElementById("resultado").textContent = valor;
      }
    </script>
  </body>
</html>
